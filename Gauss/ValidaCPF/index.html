<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form method="POST" name="cadastrar"></form>
    <p><b>Informe seu CPF a ser validado:</b></p>

    <div>
        <input id="cpf" onkeyup="document.getElementById('validation').innerHTML = validaCPF(this.value)">
        <b><span id="validation"></span></b>
    </div>

    <script>
    function validarCPF(cpf) {
        var soma = 0
        var resto = 0

        var strCPF = String(cpf).replace(/[^\]/g, '')

        if (strCPF.length !==11)
            return 'Inválido'

        if ([
        '00000000000',
        '11111111111',
        '22222222222',
        '33333333333',
        '44444444444',
        '55555555555',
        '66666666666',
        '77777777777',
        '88888888888',
        '99999999999'
        ].indexOf(strCPF) !== -1)
        return 'Inválido'

        //Início do cálculo do 1º DV
        for (i=1; i<=9; i++)
        soma = soma + parseInt(strCPF.substring(i-1, i)) * (11-i);

        resto = (soma * 10) % 11

        if ((resto == 10) || (resto == 11))
        resto = 0

        if (resto != parseInt(strCPF.substring(9,10)) )
        return 'Inválido'

        soma = 0

        //Início do cálculo do 2º DV
        for (i=1; i<=9; i++)
        soma = soma + parseInt(strCPF.substring(i-1, i)) * (12-i);

        resto = (soma * 10) % 11

        if ((resto == 10) || (resto == 11))
        resto = 0

        if (resto != parseInt(strCPF.substring(10,11)) )
        return 'Inválido'

        return 'Ok'

}
</script>
</body>
</html>
